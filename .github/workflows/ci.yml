name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Install dev dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run automated tests
        run: pytest -m "not integration and not gui"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint maintained test and helper scripts
        run: ruff check tests scripts/manual_tests list_models.py

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install detect-secrets
        run: python -m pip install detect-secrets

      - name: Scan tracked files for secrets
        run: git ls-files -z | xargs -0 detect-secrets-hook
